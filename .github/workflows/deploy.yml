name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Pulls the external/MahjongIndeler submodule that provides Tsump.Shared.
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish RiichiCalc/RiichiCalc.csproj -c Release -o release

      # Rewrite both index.html and 404.html for the GitHub Pages project subpath.
      # CHANGE THIS to match the repo name you create (e.g. /MahjongRiichiCalc/).
      - name: Set base path for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/MahjongRiichiCalc/" />|' release/wwwroot/index.html

      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
